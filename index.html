<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dr Pop Café</title>

<style>
body {
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  color:white;
  overflow:hidden;
}

/* 3D canvas */
canvas {
  position: fixed;
  top:0;
  z-index:-1;
}

/* intro screen */
#intro {
  position: fixed;
  width:100%;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:50px;
  background:black;
  z-index:10;
}

/* main */
header {
  display:flex;
  justify-content:space-between;
  padding:20px 40px;
}

nav a {
  margin-left:20px;
  cursor:pointer;
  transition:.3s;
}

nav a:hover {
  color:orange;
}

.section {
  display:none;
  padding:60px;
  animation:fade .5s ease;
}

.active {
  display:block;
}

@keyframes fade {
  from {opacity:0; transform:translateY(20px);}
  to {opacity:1; transform:translateY(0);}
}

.card {
  padding:15px;
  margin:10px 0;
  background:rgba(0,0,0,0.6);
  border-radius:10px;
  cursor:pointer;
  transition:.3s;
}

.card:hover {
  transform:scale(1.05);
  background:rgba(255,123,0,0.5);
}

.btn {
  margin-top:20px;
  display:inline-block;
  background:orange;
  padding:10px 20px;
  border-radius:20px;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- intro -->
<div id="intro">Dr Pop</div>

<canvas id="bg"></canvas>

<header>
  <h2>Dr Pop Café</h2>
  <nav>
    <a onclick="go('home')">Home</a>
    <a onclick="go('menu')">Menu</a>
    <a onclick="go('login')">Login</a>
  </nav>
</header>

<!-- HOME -->
<div id="home" class="section">
  <h1>Welcome to Dr Pop</h1>
  <p>Premium Coffee Experience</p>
  <div class="btn" onclick="go('menu')">Explore Menu</div>
</div>

<!-- MENU -->
<div id="menu" class="section">
  <h1>Menu</h1>

  <div class="card" onclick="go('coffee')">☕ Coffee</div>
  <div class="card" onclick="go('food')">🍔 Food</div>
  <div class="card" onclick="go('dessert')">🍰 Desserts</div>
</div>

<!-- COFFEE -->
<div id="coffee" class="section">
  <h1>Coffee</h1>
  <div class="card">Espresso - $3</div>
  <div class="card">Latte - $5</div>
  <div class="card">Cappuccino - $4</div>
  <div class="btn" onclick="go('menu')">Back</div>
</div>

<!-- FOOD -->
<div id="food" class="section">
  <h1>Food</h1>
  <div class="card">Burger - $8</div>
  <div class="card">Sandwich - $6</div>
  <div class="btn" onclick="go('menu')">Back</div>
</div>

<!-- DESSERT -->
<div id="dessert" class="section">
  <h1>Desserts</h1>
  <div class="card">Cheesecake - $6</div>
  <div class="card">Brownie - $5</div>
  <div class="btn" onclick="go('menu')">Back</div>
</div>

<!-- LOGIN -->
<div id="login" class="section">
  <h1>Login</h1>
  <input placeholder="Username"><br><br>
  <input type="password" placeholder="Password"><br><br>
  <button onclick="alert('Logged in')">Login</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
// intro animation
setTimeout(()=>{
  document.getElementById("intro").style.display="none";
  go('home');
  document.body.style.overflow="auto";
},2000);

// navigation
function go(id){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// 3D background
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);

const renderer = new THREE.WebGLRenderer({canvas:document.getElementById('bg')});
renderer.setSize(window.innerWidth, window.innerHeight);

const geometry = new THREE.TorusKnotGeometry(10,3,100,16);
const material = new THREE.MeshStandardMaterial({color:0xff7b00});

const mesh = new THREE.Mesh(geometry, material);
scene.add(mesh);

const light = new THREE.PointLight(0xffffff);
light.position.set(20,20,20);
scene.add(light);

camera.position.z = 30;

function animate(){
  requestAnimationFrame(animate);
  mesh.rotation.x += 0.01;
  mesh.rotation.y += 0.01;
  renderer.render(scene,camera);
}

animate();
</script>

</body>
</html>
